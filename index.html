<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>黄金裔九宫格 · 实时共享版</title>
<style>
* { box-sizing: border-box; }
body {
  background: #121212;
  color: #eee;
  font-family: system-ui, -apple-system, sans-serif;
  margin: 0;
  padding: 20px;
}
.loading {
  text-align: center;
  margin-top: 80px;
  color: #aaa;
}
h1 {
  color: gold;
  text-align: center;
  margin-bottom: 40px;
  font-size: 36px;
}
.header-controls {
  text-align: right;
  max-width: 980px;
  margin: 0 auto 30px;
}
.btn-manage {
  background: #673ab7;
  color: #fff;
  border: none;
  padding: 10px 22px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}
.btn-manage:hover {
  background: #7853c7;
}
.grid {
  display: grid;
  grid-template-columns: repeat(3, 300px);
  gap: 24px;
  justify-content: center;
  margin-bottom: 60px;
}
.cell {
  background: #171717;
  border: 2px solid #333;
  border-radius: 16px;
  padding: 24px;
  cursor: pointer;
  transition: 0.3s;
  text-align: center;
}
.cell:hover {
  border-color: gold;
  transform: translateY(-4px);
  box-shadow: 0 6px 16px rgba(255,215,0,0.15);
}
.cell img {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  object-fit: cover;
  margin: 0 auto 16px;
}
.cell h3 {
  margin: 0 0 8px;
  color: gold;
  font-size: 20px;
}
.cell p {
  margin: 0;
  opacity: 0.8;
  font-size: 15px;
}

/* 投票面板 */
.panel {
  display: none;
  background: #131313;
  border: 2px solid #363636;
  border-radius: 16px;
  padding: 32px;
  margin: 40px auto;
  max-width: 780px;
}
.panel h2 {
  text-align: center;
  color: gold;
  margin: 0 0 28px;
  font-size: 28px;
}
.back {
  display: inline-flex;
  align-items: center;
  color: #ccc;
  cursor: pointer;
  margin-bottom: 24px;
  font-size: 16px;
}
.back:hover {
  color: gold;
}
.member {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 16px;
  margin-bottom: 16px;
  border-radius: 12px;
  background: #1f1f1f;
  border: 1px solid #333;
}
.member img {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  object-fit: cover;
}
.member-info {
  flex: 1;
}
.member-name {
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 4px;
}
.member-votes {
  opacity: 0.75;
  font-size: 15px;
}
.btn-vote {
  background: #2e7d32;
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 500;
}
.btn-vote:hover {
  background: #338a38;
}
.rank-badge {
  font-size: 16px;
  opacity: 0.7;
  margin-right: 8px;
}

/* 全局成员弹窗（PC适配） */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
}
.modal-content {
  background: #151515;
  border: 2px solid #404040;
  border-radius: 18px;
  padding: 36px 40px;
  margin: 80px auto;
  max-width: 560px;
  position: relative;
  animation: modalIn 0.3s ease-out;
}
@keyframes modalIn {
  from {
    opacity: 0;
    transform: scale(0.95) translateY(-20px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}
.close {
  position: absolute;
  right: 20px;
  top: 20px;
  font-size: 32px;
  line-height: 1;
  color: #ccc;
  cursor: pointer;
}
.close:hover {
  color: gold;
}
.modal h2 {
  color: gold;
  text-align: center;
  margin: 0 0 30px;
  font-size: 26px;
}
.form-group {
  margin-top: 26px;
}
.form-group label {
  display: block;
  margin-bottom: 10px;
  font-weight: 500;
  color: #ddd;
}
.form-group input[type="text"],
.form-group input[type="file"] {
  width: 100%;
  padding: 12px 16px;
  border-radius: 8px;
  border: 1px solid #444;
  background: #222;
  color: #fff;
  font-size: 15px;
  margin-bottom: 18px;
  outline: none;
}
.form-group input:focus {
  border-color: gold;
  box-shadow: 0 0 0 2px rgba(255,215,0,0.2);
}
.btn-submit {
  width: 100%;
  padding: 14px;
  background: #1976d2;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 10px;
}
.btn-submit:hover {
  background: #1e88e5;
}
.global-tip {
  margin-top: 22px;
  padding: 14px;
  border-radius: 8px;
  background: #152238;
  font-size: 14px;
  opacity: 0.8;
  line-height: 1.5;
}
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>

<body>

<div id="loading" class="loading">正在连接数据库…</div>

<div id="app" style="display:none">
  <h1>黄金裔阵营九宫格</h1>
  <div class="header-controls">
    <button class="btn-manage" onclick="showModal()">📁 管理全局成员</button>
  </div>
  <div class="grid" id="grid"></div>
  <div class="panel" id="panel">
    <div class="back" onclick="hidePanel()">&larr; 返回九宫格</div>
    <h2 id="panelTitle"></h2>
    <div id="memberList"></div>
  </div>
  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="close" onclick="hideModal()">&times;</span>
      <h2>🌍 添加全局成员</h2>
      <div class="form-group">
        <label>姓名（唯一）</label>
        <input type="text" id="globalName" placeholder="例：法厄同">
        <input type="file" id="globalImg" accept="image/*">
        <button class="btn-submit" onclick="addGlobalMember()">🚀 提交并同步到九大阵营</button>
      </div>
      <div class="global-tip">提交后全员可见，所有访客共用一个榜单。</div>
    </div>
  </div>
</div>

<script>
// ==================== Firebase 配置（已填入你的 URL） ====================
const firebaseConfig = {
  apiKey: "AIzaSyA6-SfejDyhR2ZqA46mosrjLi-OHnZmHhY",
  authDomain: "golden-vote-db.firebaseapp.com",
  databaseURL: "https://golden-vote-db-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "golden-vote-db",
  storageBucket: "golden-vote-db.firebasestorage.app",
  messagingSenderId: "282275390725",
  appId: "1:282275390725:web:f662562820675b008b036c",
  measurementId: "G-91XNPBNPWF"
};
try {
  firebase.initializeApp(firebaseConfig);
} catch (err) {
  document.getElementById('loading').innerHTML = 'Firebase 配置错误，请检查 apiKey 等字段';
}
const db = firebase.database();

// ==================== 常量与状态 ====================
const FACTIONS = [
  "守序善良","中立善良","混乱善良",
  "守序中立","绝对中立","混乱中立",
  "守序邪恶","中立邪恶","混乱邪恶"
];
const DB_ROOT = 'golden_shared_data_v2';
let currentFaction = '';
let isConnected = false;

// ==================== 初始化 ====================
db.ref('.info/connected').on('value', snap => {
  isConnected = !!snap.val();
  if (isConnected) {
    db.ref(DB_ROOT).on('value', renderFromSnapshot);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    document.getElementById('loading').textContent = '网络断开，请刷新重试';
  }
}, err => {
  document.getElementById('loading').textContent = '连接数据库失败，请检查配置';
});

function renderFromSnapshot(snapshot) {
  const data = snapshot.val() || { globalMembers: [] };
  window.sharedData = data;
  renderGrid();
  if (currentFaction) renderMembers();
}

// ==================== 九宫格 ====================
function renderGrid() {
  const grid = document.getElementById("grid");
  if (!grid) return;
  grid.innerHTML = "";
  const d = window.sharedData;

  FACTIONS.forEach(f => {
    const factionData = d[f] || {};
    let topName = "暂无", topImg = "https://placehold.co/128?text=?";
    if (factionData.votes && Object.keys(factionData.votes).length) {
      const topId = Object.keys(factionData.votes).reduce(
        (a, b) => factionData.votes[a] >= factionData.votes[b] ? a : b, ""
      );
      const m = d.globalMembers?.find(g => g.id === topId);
      if (m) { topName = m.name; topImg = m.img; }
    }
    const div = document.createElement("div");
    div.className = "cell";
    div.onclick = () => showPanel(f);
    div.innerHTML = `
      <img src="${topImg}" onerror="this.src='https://placehold.co/126?text=?'">
      <h3>${f}</h3>
      <p>当前最高：${topName}</p>
    `;
    grid.appendChild(div);
  });
}

// ==================== 投票面板 ====================
function showPanel(f) {
  document.getElementById("panel").style.display = "block";
  document.getElementById("panelTitle").innerText = f;
  currentFaction = f;
  renderMembers();
}

function hidePanel() {
  document.getElementById("panel").style.display = "none";
  currentFaction = '';
}

function renderMembers() {
  const list = document.getElementById("memberList");
  if (!list) return;
  list.innerHTML = "";
  const d = window.sharedData[currentFaction] || {};
  const mems = (d.memberIds || [])
    .map(id => {
      const info = (window.sharedData.globalMembers || []).find(m => m.id === id);
      return info ? { ...info, votes: (d.votes || {})[id] || 0 } : null;
    })
    .filter(Boolean)
    .sort((a, b) => b.votes - a.votes);

  mems.forEach((mem, i) => {
    const div = document.createElement("div");
    div.className = "member";
    div.innerHTML = `
      <span class="rank-badge">#${i + 1}</span>
      <img src="${mem.img}" onerror="this.src='https://placehold.co/645?text=?'">
      <div class="member-info">
        <div class="member-name">${mem.name}</div>
        <div class="member-votes">${mem.votes} 票</div>
      </div>
      <button class="btn-vote" onclick="vote('${mem.id}')">投票</button>
    `;
    list.appendChild(div);
  });

  if (!mems.length) {
    list.innerHTML = "<p style='opacity:0.772'>管理员请先在弹窗中添加全局成员</p>";
  }
}

async function vote(memId) {
  if (!isConnected) return alert("网络未连接，请刷新后重试");
  const ref = db.ref(`${DB_ROOT}/${currentFaction}/votes/${memId}`);
  await ref.transaction(v => (v || 0) + 1);
}

// ==================== 全局成员弹窗 ====================
function showModal() {
  document.getElementById("modal").style.display = "block";
}

function hideModal() {
  document.getElementById("modal").style.display = "none";
}

async function addGlobalMember() {
  if (!isConnected) return alert("请保持网络连接");
  const name = document.getElementById("globalName").value.trim();
  const file = document.getElementById("globalImg").files[0];
  if (!name || !file) return alert("名字和头像都要填哦");
  if ((window.sharedData.globalMembers || []).some(m => m.name === name)) {
    return alert("这个名字已被占用");
  }

  const id = Date.now().toString(36) + Math.random().toString(36).slice(2);
  const img = await readFileAsDataURL(file);

  // 更新全局成员
  const globalRef = db.ref(`${DB_ROOT}/globalMembers`);
  const newGlobals = [...(window.sharedData.globalMembers || []), { id, name, img }];
  await globalRef.set(newGlobals);

  // 自动加入九阵营
  for (const f of FACTIONS) {
    const factionRef = db.ref(`${DB_ROOT}/${f}`);
    const fData = window.sharedData[f] || { memberIds: [], votes: {} };
    if (!fData.memberIds.includes(id)) {
      fData.memberIds.push(id);
      fData.votes[id] = 0;
      await factionRef.set(fData);
    }
  }

  alert(`✅ 【${name}】已同步到九大阵营`);
  document.getElementById("globalName").value = "";
  document.getElementById("globalImg").value = "";
  hideModal();
}

function readFileAsDataURL(file) {
  return new Promise(r => {
    const fr = new FileReader();
    fr.onload = e => r(e.target.result);
    fr.readAsDataURL(file);
  });
}

window.onclick = e => {
  if (e.target === document.getElementById("modal")) hideModal();
};
</script>
</body>
</html>
